# mkdocs.yml — Dungeon Laundry Help Center (MkDocs Material)
# Works with:
#   mkdocs==1.6.1
#   mkdocs-material==9.6.x
#   mkdocs-git-revision-date-localized-plugin==1.2.x

site_name: Dungeon Laundry Help Center
site_description: Official Help & Legal Documentation for Dungeon Laundry
site_author: Dungeon Laundry
site_url: https://help.dungeonlaundry.com/

# Optional repo links (edit to your real repo)
repo_url: https://github.com/YOUR_USERNAME/YOUR_REPO
repo_name: dungeonlaundry/help-center
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh-TW
  # Uncomment when you have these files
  # logo: assets/logo.png
  # favicon: assets/favicon.png

  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
    - content.action.edit

  palette:
    - scheme: default
      primary: black
      accent: deep purple

plugins:
  - search:
      lang: [zh, en]
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      timezone: Asia/Taipei
      locale: zh_TW

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
      title: 目錄
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false
  # Optional social links (edit/remove)
  # social:
  #   - icon: fontawesome/brands/instagram
  #     link: https://instagram.com/dungeonlaundry
  #   - icon: fontawesome/brands/line
  #     link: https://line.me/

# Put a minimal legal footer (edit as needed)
copyright: >
  Copyright © 2026 Dungeon Laundry. All rights reserved.

nav:
  - 首頁: index.md

  - 法律文件:
      - 服務條款: legal/fu-wu-tiao-kuan.md
      - 隱私權政策: legal/privacy-policy.md
      - 資料安全: legal/data-security.md
      - 常客計劃條款與條件: legal/chang-ke-ji-hua-tiao-kuan-yu-tiao-jian.md

  # Optional sections (only keep if you have these files)
  # - 會員制度:
  #     - 會籍挑戰說明: membership/status-challenge.md
  #     - 會員等級說明: membership/tier-overview.md
  #
  # - 聯絡我們:
  #     - 客服資訊: contact.md